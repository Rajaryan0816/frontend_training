<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Mania</title>
</head>
<body>

    <!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Mania</title>

</head>
<body>


<h2 align="center"><mark>🍕 Pizza Mania 🍕</mark></h2>

<fieldset>
    <legend><h2>🍕 Pizza Order Here 🍕</h2></legend>

    <form action="">
        <table cellpadding="8">

            <tr>
                <th><label for="a">First Name:</label></th>
                <td><input id="a" type="text" placeholder="First Name"></td>
            </tr>

            <tr>
                <th><label for="b">Last Name:</label></th>
                <td><input type="text" id="b" placeholder="Last Name"></td>
            </tr>

            <tr>
                <th><label for="c">Email:</label></th>
                <td><input type="email" id="c" placeholder="abc@example.com"></td>
            </tr>

            <tr>
                <th><label for="d">Contact:</label></th>
                <td><input type="tel" id="d" placeholder="Ex-9898989898"></td>
            </tr>

            <tr>
                <th><label for="e">Preferred Delivery Date:</label></th>
                <td><input type="date" id="e"></td>
            </tr>

            <tr>
                <th><label>Size:</label></th>
                <td>
                    Small <input type="radio" name="size">
                    Medium <input type="radio" name="size">
                    Large <input type="radio" name="size">
                </td>
            </tr>

            <tr>
                <th><label><mark>Outlet:</mark></label></th>
                <td>
                    <select>
                        <option>Select Outlet</option>
                        <option>Delhi</option>
                        <option>Mumbai</option>
                        <option>Kolkata</option>
                    </select>
                </td>
            </tr>

        </table>

        <h3>Menu ↓</h3>

        <table cellpadding="10">

            <tr>
                <td>
                    <img src="./pizza.png" width="100" height="80" alt="Hawaiian Pizza">
                    <input type="checkbox"> Hawaiian (150.00 rs <del>170.00rs</del>)
                </td>
                <td>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    <img src="./pizza.png" width="100" height="80" alt="Pepperoni Pizza">
                    <input type="checkbox"> Pepperoni (140.00 rs <del>160.00rs</del>)
                </td>
                <td>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    <img src="./pizza.png" width="100" height="80" alt="Vegetable Pizza">
                    <input type="checkbox"> Vegetable (130.00 rs <del>150.00rs</del>)
                </td>
                <td>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>
                </td>
            </tr>

        </table>

        <h3>Extra Details ↓</h3>

<table cellpadding="10">

    <tr>
        <th><img src="./cc.png" width="40" height="30"></th>
        <th>Credit Card:</th>
        <td>
            <input type="text" placeholder="1234-5678-9123-1111">
            <button type="button">Verify Card</button>
        </td>
    </tr>

    <tr>
        <th><img src="./pin.png" width="40" height="30"></th>
        <th>Pin:</th>
        <td>
            <input type="password" placeholder="421604">
        </td>
    </tr>

    <tr>
        <th><img src="./gal.png" width="40" height="30"></th>
        <th><mark>Upload photo for discount:</mark></th>
        <td>
            <input type="file">
        </td>
    </tr>

    <tr>
        <th><img src="./note.png" width="40" height="30"></th>
        <th><mark>Additional Note:</mark></th>
        <td>
            <textarea rows="4" cols="30"></textarea>
        </td>
    </tr>

    <tr>
        <th><img src="./star.png" width="40" height="30"></th>
        <th><mark>Rating:</mark></th>
        <td>
            <input type="range">
        </td>
    </tr>

    <tr>
        <td colspan="4" align="center">
            <button type="submit">Submit Order</button>
        </td>
    </tr>

</table>

    </form>
</fieldset>


</body>
</html>


</body>
</html>
