<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact form</title>

    <style>
        label{
            display: inline-block;
            width: 150px;
            text-align: right;
            margin-right: 10px;
        }

        table{
            margin-top: 10px;
        }

        td{
            padding: 5px;
        }
        input{
            padding: 5px;
        }
        button{
            margin-top: 10px;
            display: block;
            margin: 20px auto;
        }
        form{
            border: 2px solid black;
            padding: 15px;
            width: 50%;
        }

        body{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h3,h4{
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Contact Details</h1>
    <h3>Please enter your personal details:</h3>
    <form action="">
        <table>
            <tr>
                <td><label for="a">First name</label></td>
                <td><input id="a" type="text" required></td>

            </tr>
            
            <tr>
                <td><label for="b">Last name:</label></td>
                <td><input id="b" type="text" required></td>

            </tr>
            
            <tr>
                <td><label for="c">Street Address:</label></td>
                <td><input id="c" type="text"></td>

            </tr>
            
            <tr>
                <td><label for="d">Town/city:</label></td>
                <td><input id="d" type="text"></td>

            </tr>
            
            <tr>
                <td><label for="e">Postcode/zip:</label></td>
                <td><input id="e" type="number"></td>

            </tr>
            
            <tr>
                <td><label for="f">Telephone:</label></td>
                <td><input id="f" type="tel"></td>

            </tr>
            
            <tr>
                <td><label for="g">Mobile:</label></td>
                <td><input id="g" type="number"></td>

            </tr>
            
            <tr>
                <td><label for="h">Email Address</label></td>
                <td><input id="h" type="email" required></td>

            </tr>
        </table>
        <h4>Fields marked * are required</h4>
        <button>submit</button>
    </form>
    
</body>
</html>
