<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header{
            background-color: black;
            color: white;
            padding: 20px;
            text-align: center;
        }
        ul{
            list-style: none;
            display: flex;
            background-color: rgb(151, 151, 195);
            padding: 20px;
            gap: 10px;
            border: 2px dotted black;
        }

        footer{
            background-color: black;
            color: white;
            text-align: center;
            padding: 20px;
            border: 2px dotted rgb(165, 26, 26);
        }

        main{
            background-color: grey;
            padding: 246px;
        }
    </style>
</head>
<body>
    <header>My Website</header>

    <nav>
        <ul>
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
            <li><a href="">Services</a></li>
        </ul>
    </nav>

    <main>
        <h1>This is Capgemini Training</h1>
        <h3>Training Duration 1 month 14 day's</h3>
    </main>

    <footer>@2026 All Rights reserved</footer>
    
</body>
</html>
