<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <!-- internal css for p tag -->
    <style>
        p::first-letter{
            color: red;
            font-size: 40px;
        }
    </style>
</head>
<body>

    <!-- inline css for h1 tag -->
    <h1 style="color: blueviolet; background-color: black;">Welcome to my home</h1>
    <p>Hello Everyone</p>
    
</body>
</html>
